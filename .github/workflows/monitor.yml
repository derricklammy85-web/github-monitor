name: GitHub Project Monitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Monitor GitHub Projects
      run: |
        # 翻译函数
        translate_text() {
          local text="$1"
          if [ -z "$text" ] || [ "$text" == "null" ]; then
            echo ""
            return
          fi
          
          # URL编码
          local encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$text'''))")
          
          # 调用翻译API
          local result=$(curl -s "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-CN&dt=t&q=${encoded}" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data[0][0][0] if data and len(data)>0 and len(data[0])>0 else '')" 2>/dev/null)
          
          if [ -n "$result" ]; then
            echo "$result"
          else
            echo "$text"
          fi
        }
        
        # 获取并处理 README 内容
        get_readme_summary() {
          local repo="$1"
          
          # 获取 README 内容（不输出调试信息）
          local readme=$(curl -s "https://api.github.com/repos/${repo}/readme" -H "Accept: application/vnd.github.v3.raw" 2>/dev/null)
          
          if [ -z "$readme" ] || [ "$readme" == "Not Found" ]; then
            echo ""
            return
          fi
          
          # 提取前600个字符的有效内容（跳过标题、徽章、图片、链接）
          local summary=$(echo "$readme" | sed 's/!\[.*\](.*)//g' | sed 's/\[!\[.*\](.*)//g' | sed 's/<[^>]*>//g' | grep -v "^#" | grep -v "^---" | grep -v "^\*\*" | grep -v "^$" | head -15 | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-600)
          
          if [ -n "$summary" ]; then
            echo "$summary"
          else
            echo ""
          fi
        }
        
        # 获取当前时间
        TIMESTAMP=$(date '+%Y年%m月%d日 %H:%M:%S')
        
        # 构建消息头部
        MESSAGE="📊 <b>GitHub 热门项目 TOP 10</b>%0A"
        MESSAGE="${MESSAGE}🕐 更新时间: ${TIMESTAMP}%0A"
        MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━%0A%0A"
        
        echo "正在获取 GitHub 热门项目..."
        
        # 调用 GitHub API 获取热门项目
        TRENDING_DATA=$(curl -s "https://api.github.com/search/repositories?q=stars:>1000&sort=stars&order=desc&per_page=10")
        
        # 检查 API 调用是否成功
        if [ -z "$TRENDING_DATA" ]; then
          echo "❌ 获取数据失败"
          exit 1
        fi
        
        # 遍历前10个项目
        for i in {0..9}; do
          echo "正在处理第 $((i+1)) 个项目..."
          
          # 提取项目数据
          REPO=$(echo "$TRENDING_DATA" | jq -r ".items[$i].full_name")
          
          # 检查是否获取到数据
          if [ "$REPO" == "null" ] || [ -z "$REPO" ]; then
            echo "没有更多项目"
            break
          fi
          
          STARS=$(echo "$TRENDING_DATA" | jq -r ".items[$i].stargazers_count")
          FORKS=$(echo "$TRENDING_DATA" | jq -r ".items[$i].forks_count")
          WATCHERS=$(echo "$TRENDING_DATA" | jq -r ".items[$i].watchers_count")
          ISSUES=$(echo "$TRENDING_DATA" | jq -r ".items[$i].open_issues_count")
          LANGUAGE=$(echo "$TRENDING_DATA" | jq -r ".items[$i].language")
          URL=$(echo "$TRENDING_DATA" | jq -r ".items[$i].html_url")
          DESC=$(echo "$TRENDING_DATA" | jq -r ".items[$i].description")
          CREATED=$(echo "$TRENDING_DATA" | jq -r ".items[$i].created_at" | cut -d'T' -f1)
          UPDATED=$(echo "$TRENDING_DATA" | jq -r ".items[$i].updated_at" | cut -d'T' -f1)
          TOPICS=$(echo "$TRENDING_DATA" | jq -r ".items[$i].topics[]" 2>/dev/null | head -5 | tr '\n' ', ' | sed 's/,$//')
          
          # 添加排名
          RANK=$((i+1))
          
          # 添加项目信息
          MESSAGE="${MESSAGE}<b>🏆 第 ${RANK} 名</b>%0A"
          MESSAGE="${MESSAGE}🔗 <b><a href='${URL}'>${REPO}</a></b>%0A%0A"
          
          # 翻译并添加项目描述
          if [ "$DESC" != "null" ] && [ -n "$DESC" ]; then
            echo "正在翻译项目描述..."
            DESC_CN=$(translate_text "$DESC")
            if [ -n "$DESC_CN" ]; then
              MESSAGE="${MESSAGE}📝 <b>简介:</b> ${DESC_CN}%0A%0A"
            fi
          fi
          
          # 获取 README 摘要
          echo "正在获取 README 内容..."
          README_SUMMARY=$(get_readme_summary "$REPO")
          
          # 添加详细说明（从 README）
          if [ -n "$README_SUMMARY" ]; then
            echo "正在翻译 README 摘要..."
            README_CN=$(translate_text "$README_SUMMARY")
            if [ -n "$README_CN" ]; then
              MESSAGE="${MESSAGE}� <b>详细说明:</b> ${README_CN}%0A%0A"
            fi
          fi
          
          # 添加主题标签（如果有）
          if [ -n "$TOPICS" ] && [ "$TOPICS" != "null" ]; then
            MESSAGE="${MESSAGE}🏷️ <b>标签:</b> ${TOPICS}%0A%0A"
          fi
          
          # 添加统计数据
          MESSAGE="${MESSAGE}⭐ <b>收藏:</b> $(printf "%'d" $STARS 2>/dev/null || echo $STARS) | "
          MESSAGE="${MESSAGE}🍴 <b>分支:</b> $(printf "%'d" $FORKS 2>/dev/null || echo $FORKS) | "
          MESSAGE="${MESSAGE}👀 <b>关注:</b> $(printf "%'d" $WATCHERS 2>/dev/null || echo $WATCHERS)%0A"
          MESSAGE="${MESSAGE}� <b>问题:</b> $(printf "%'d" $ISSUES 2>/dev/null || echo $ISSUES)"
          
          if [ "$LANGUAGE" != "null" ] && [ -n "$LANGUAGE" ]; then
            MESSAGE="${MESSAGE} | 💻 <b>语言:</b> ${LANGUAGE}"
          fi
          
          MESSAGE="${MESSAGE}%0A📅 <b>创建:</b> ${CREATED} | 🔄 <b>更新:</b> ${UPDATED}%0A"
          MESSAGE="${MESSAGE}%0A━━━━━━━━━━━━━━━━%0A%0A"
          
          # 添加延迟避免 API 限流
          sleep 3
        done
        
        # 添加消息尾部
        MESSAGE="${MESSAGE}🤖 <i>自动监测 | 每3小时更新一次</i>%0A"
        MESSAGE="${MESSAGE}� <i>数据来源: GitHub API</i>%0A"
        MESSAGE="${MESSAGE}🌐 <i>内容已自动翻译为中文</i>"
        
        # 发送到 Telegram
        echo "正在发送消息到 Telegram..."
        
        RESPONSE=$(curl -s -X POST \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true")
        
        # 检查发送结果
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
          echo "✅ 消息发送成功！"
        else
          echo "❌ 消息发送失败："
          echo "$RESPONSE"
          exit 1
        fi
