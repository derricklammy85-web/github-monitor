name: GitHub Project Monitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Monitor GitHub Projects
      run: |
        # 翻译函数（使用 Google Translate API）
        translate_to_chinese() {
          local text="$1"
          # URL 编码
          local encoded_text=$(echo "$text" | jq -sRr @uri)
          # 调用翻译 API
          local translated=$(curl -s "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encoded_text}" | jq -r '.[0][0][0]' 2>/dev/null)
          
          if [ -n "$translated" ] && [ "$translated" != "null" ]; then
            echo "$translated"
          else
            echo "$text"
          fi
        }
        
        # 获取当前时间
        TIMESTAMP=$(date '+%Y年%m月%d日 %H:%M:%S')
        
        # 构建消息头部
        MESSAGE="📊 <b>GitHub 热门项目 TOP 10</b>%0A"
        MESSAGE="${MESSAGE}🕐 更新时间: ${TIMESTAMP}%0A"
        MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━%0A%0A"
        
        echo "正在获取 GitHub 热门项目..."
        
        # 调用 GitHub API 获取热门项目（按 stars 排序）
        TRENDING_DATA=$(curl -s "https://api.github.com/search/repositories?q=stars:>1000&sort=stars&order=desc&per_page=10")
        
        # 解析并遍历前10个项目
        for i in {0..9}; do
          echo "正在处理第 $((i+1)) 个项目..."
          
          # 提取项目数据
          REPO=$(echo $TRENDING_DATA | jq -r ".items[$i].full_name")
          STARS=$(echo $TRENDING_DATA | jq -r ".items[$i].stargazers_count")
          FORKS=$(echo $TRENDING_DATA | jq -r ".items[$i].forks_count")
          WATCHERS=$(echo $TRENDING_DATA | jq -r ".items[$i].watchers_count")
          ISSUES=$(echo $TRENDING_DATA | jq -r ".items[$i].open_issues_count")
          LANGUAGE=$(echo $TRENDING_DATA | jq -r ".items[$i].language")
          URL=$(echo $TRENDING_DATA | jq -r ".items[$i].html_url")
          DESC=$(echo $TRENDING_DATA | jq -r ".items[$i].description")
          CREATED=$(echo $TRENDING_DATA | jq -r ".items[$i].created_at" | cut -d'T' -f1)
          UPDATED=$(echo $TRENDING_DATA | jq -r ".items[$i].updated_at" | cut -d'T' -f1)
          
          # 检查是否获取到数据
          if [ "$REPO" == "null" ] || [ -z "$REPO" ]; then
            break
          fi
          
          # 格式化数字（添加千位分隔符）
          STARS_FMT=$(printf "%'d" $STARS 2>/dev/null || echo $STARS)
          FORKS_FMT=$(printf "%'d" $FORKS 2>/dev/null || echo $FORKS)
          WATCHERS_FMT=$(printf "%'d" $WATCHERS 2>/dev/null || echo $WATCHERS)
          ISSUES_FMT=$(printf "%'d" $ISSUES 2>/dev/null || echo $ISSUES)
          
          # 添加排名
          RANK=$((i+1))
          
          # 添加项目信息到消息
          MESSAGE="${MESSAGE}<b>🏆 第 ${RANK} 名</b>%0A"
          MESSAGE="${MESSAGE}🔗 <b><a href='${URL}'>${REPO}</a></b>%0A"
          
          # 翻译项目描述
          if [ "$DESC" != "null" ] && [ -n "$DESC" ]; then
            echo "正在翻译项目描述..."
            # 限制描述长度
            DESC_SHORT=$(echo "$DESC" | head -c 200)
            # 翻译成中文
            DESC_CN=$(translate_to_chinese "$DESC_SHORT")
            MESSAGE="${MESSAGE}📝 <b>项目用途:</b> ${DESC_CN}%0A%0A"
          else
            MESSAGE="${MESSAGE}📝 <b>项目用途:</b> 暂无描述%0A%0A"
          fi
          
          # 添加统计数据
          MESSAGE="${MESSAGE}⭐ <b>收藏数:</b> ${STARS_FMT}%0A"
          MESSAGE="${MESSAGE}🍴 <b>分支数:</b> ${FORKS_FMT}%0A"
          MESSAGE="${MESSAGE}👀 <b>关注数:</b> ${WATCHERS_FMT}%0A"
          MESSAGE="${MESSAGE}🐛 <b>问题数:</b> ${ISSUES_FMT}%0A"
          MESSAGE="${MESSAGE}💻 <b>开发语言:</b> ${LANGUAGE}%0A"
          MESSAGE="${MESSAGE}📅 <b>创建时间:</b> ${CREATED}%0A"
          MESSAGE="${MESSAGE}🔄 <b>更新时间:</b> ${UPDATED}%0A"
          MESSAGE="${MESSAGE}%0A━━━━━━━━━━━━━━━━%0A%0A"
          
          # 避免请求过快
          sleep 1
        done
        
        # 添加消息尾部
        MESSAGE="${MESSAGE}🤖 <i>自动监测 | 每3小时更新一次</i>%0A"
        MESSAGE="${MESSAGE}💡 <i>数据来源: GitHub API</i>%0A"
        MESSAGE="${MESSAGE}🌐 <i>项目描述已自动翻译成中文</i>"
        
        # 发送到 Telegram
        echo "正在发送消息到 Telegram..."
        
        RESPONSE=$(curl -s -X POST \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true")
        
        # 检查发送结果
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null; then
          echo "✅ 消息发送成功！"
        else
          echo "❌ 消息发送失败："
          echo "$RESPONSE" | jq '.'
          exit 1
        fi
