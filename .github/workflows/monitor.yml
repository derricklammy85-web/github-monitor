name: GitHub Project Monitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Monitor GitHub Projects
      run: |
        # 要监控的项目列表
        REPOS=(
          "microsoft/vscode"
          "facebook/react"
          "vuejs/vue"
        )
        
        # 获取当前时间
        TIMESTAMP=$(date '+%Y年%m月%d日 %H:%M:%S')
        
        # 构建消息头部
        MESSAGE="📊 <b>GitHub 项目热度报告</b>%0A"
        MESSAGE="${MESSAGE}🕐 更新时间: ${TIMESTAMP}%0A"
        MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━%0A%0A"
        
        # 遍历每个项目
        for repo in "${REPOS[@]}"; do
          echo "正在获取 $repo 的数据..."
          
          # 调用 GitHub API
          DATA=$(curl -s "https://api.github.com/repos/${repo}")
          
          # 解析数据
          STARS=$(echo $DATA | jq -r '.stargazers_count')
          FORKS=$(echo $DATA | jq -r '.forks_count')
          WATCHERS=$(echo $DATA | jq -r '.watchers_count')
          ISSUES=$(echo $DATA | jq -r '.open_issues_count')
          LANGUAGE=$(echo $DATA | jq -r '.language')
          URL=$(echo $DATA | jq -r '.html_url')
          DESC=$(echo $DATA | jq -r '.description' | head -c 150)
          CREATED=$(echo $DATA | jq -r '.created_at' | cut -d'T' -f1)
          UPDATED=$(echo $DATA | jq -r '.updated_at' | cut -d'T' -f1)
          SIZE=$(echo $DATA | jq -r '.size')
          
          # 格式化数字（添加千位分隔符）
          STARS_FMT=$(printf "%'d" $STARS 2>/dev/null || echo $STARS)
          FORKS_FMT=$(printf "%'d" $FORKS 2>/dev/null || echo $FORKS)
          WATCHERS_FMT=$(printf "%'d" $WATCHERS 2>/dev/null || echo $WATCHERS)
          ISSUES_FMT=$(printf "%'d" $ISSUES 2>/dev/null || echo $ISSUES)
          SIZE_MB=$(echo "scale=2; $SIZE / 1024" | bc)
          
          # 添加项目信息到消息
          MESSAGE="${MESSAGE}🔗 <b><a href='${URL}'>${repo}</a></b>%0A"
          
          # 添加描述
          if [ "$DESC" != "null" ] && [ -n "$DESC" ]; then
            MESSAGE="${MESSAGE}📝 ${DESC}%0A%0A"
          else
            MESSAGE="${MESSAGE}%0A"
          fi
          
          # 添加统计数据（中文标签）
          MESSAGE="${MESSAGE}⭐ <b>收藏数:</b> ${STARS_FMT}%0A"
          MESSAGE="${MESSAGE}🍴 <b>分支数:</b> ${FORKS_FMT}%0A"
          MESSAGE="${MESSAGE}👀 <b>关注数:</b> ${WATCHERS_FMT}%0A"
          MESSAGE="${MESSAGE}🐛 <b>问题数:</b> ${ISSUES_FMT}%0A"
          MESSAGE="${MESSAGE}💻 <b>开发语言:</b> ${LANGUAGE}%0A"
          MESSAGE="${MESSAGE}📦 <b>项目大小:</b> ${SIZE_MB} MB%0A"
          MESSAGE="${MESSAGE}📅 <b>创建时间:</b> ${CREATED}%0A"
          MESSAGE="${MESSAGE}🔄 <b>更新时间:</b> ${UPDATED}%0A"
          MESSAGE="${MESSAGE}%0A━━━━━━━━━━━━━━━━%0A%0A"
        done
        
        # 添加消息尾部
        MESSAGE="${MESSAGE}🤖 <i>自动监测 | 每3小时更新一次</i>%0A"
        MESSAGE="${MESSAGE}💡 <i>数据来源: GitHub API</i>"
        
        # 发送到 Telegram
        echo "正在发送消息到 Telegram..."
        
        RESPONSE=$(curl -s -X POST \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true")
        
        # 检查发送结果
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null; then
          echo "✅ 消息发送成功！"
        else
          echo "❌ 消息发送失败："
          echo "$RESPONSE" | jq '.'
          exit 1
        fi
