name: GitHub Project Monitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Monitor GitHub Projects
      run: |
        REPOS=(
          "microsoft/vscode"
          "facebook/react"
          "vuejs/vue"
        )
        
        TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
        MESSAGE="📊 <b>GitHub 项目热度报告</b>%0A"
        MESSAGE="${MESSAGE}🕐 ${TIMESTAMP}%0A%0A"
        
        for repo in "${REPOS[@]}"; do
          DATA=$(curl -s "https://api.github.com/repos/${repo}")
          
          STARS=$(echo $DATA | jq -r '.stargazers_count')
          FORKS=$(echo $DATA | jq -r '.forks_count')
          WATCHERS=$(echo $DATA | jq -r '.watchers_count')
          ISSUES=$(echo $DATA | jq -r '.open_issues_count')
          LANGUAGE=$(echo $DATA | jq -r '.language')
          URL=$(echo $DATA | jq -r '.html_url')
          
          MESSAGE="${MESSAGE}🔗 <a href='${URL}'>${repo}</a>%0A"
          MESSAGE="${MESSAGE}⭐ Stars: ${STARS}%0A"
          MESSAGE="${MESSAGE}🍴 Forks: ${FORKS}%0A"
          MESSAGE="${MESSAGE}👀 Watchers: ${WATCHERS}%0A"
          MESSAGE="${MESSAGE}🐛 Issues: ${ISSUES}%0A"
          MESSAGE="${MESSAGE}💻 Language: ${LANGUAGE}%0A%0A"
        done
        
        MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━%0A"
        MESSAGE="${MESSAGE}🤖 自动监测 | 每3小时更新"
        
        curl -s -X POST \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML"
